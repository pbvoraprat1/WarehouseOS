#http
server {
    listen 80;
    server_name warehouseos.duckdns.org;
    return 301 https://$host$request_uri;
}
#https ดึงใบรับรอง
server {
    listen 443 ssl;
    server_name warehouseos.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/warehouseos.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/warehouseos.duckdns.org/privkey.pem;

    # frontend (React)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend (Django) - API token endpoints
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend (Django) - Warehouse API endpoints
    location /warehouse/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django (admin)
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Files
    location /static/ {
        alias /var/www/inventory/static/;
    }

    # Media Files
    location /media/ {
        alias /var/www/inventory/media/;
    }
}